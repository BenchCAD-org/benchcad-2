name: pr-welcome
# One short orientation comment when a FIRST-TIME contributor opens a family PR
# (vLLM's new_pr_bot pattern: returning contributors get no bot noise).
# Uses `pull_request_target` so the token can comment on fork PRs too.
# SECURITY: this job must never check out or execute PR code — it only reads
# PR metadata and posts a comment. Keep it that way.

on:
  pull_request_target:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            // returning contributor (has a merged PR here) -> stay quiet
            const { data: prior } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} type:pr is:merged author:${pr.user.login}`,
              per_page: 1 });
            if (prior.total_count > 0) { core.info('returning contributor — no welcome'); return; }
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner, repo: context.repo.repo,
              pull_number: pr.number, per_page: 100 });
            if (!files.some(f => f.filename.startsWith('designs/'))) {
              core.info('not a family PR — no welcome needed'); return;
            }
            const R = `https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main`;
            const body = [
              `Welcome, and thanks for the family PR! Three things that answer most questions:`,
              ``,
              `- **No checks running?** A maintainer must click *Approve workflows* once for your first PR — pending, not ignored.`,
              `- **Red gate?** The message tells you the fix: click **Details**, or read the \`bench2 validate\` report comment posted after each run. Reproduce locally with \`uv sync && uv run bench2 validate <family>\` ([debug help](${R}/docs/DEBUGGING.md)).`,
              `- **Scope:** \`designs/<family>/\` holds only the package files (reference drawings/photos go in the family issue), and the PR checklist must be fully ticked. Not done yet? Mark the PR as a **Draft**.`,
              ``,
              `中文:红 ✗ 点 Details 或看 validate 报告评论;本地 \`uv run bench2 validate <family>\` 复现;参考图放 issue 不放 PR;没做完用 Draft。入门 → [GETTING_STARTED.zh](${R}/docs/GETTING_STARTED.zh.md)`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr.number, body });
