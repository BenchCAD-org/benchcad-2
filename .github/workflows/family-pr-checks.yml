name: family-pr-checks
# Hard structural gates for a family PR, on top of:
#   validate.yml            — the design actually runs (bench2 validate)
#   require-issue-link.yml  — the body links its family issue (Closes #N)
# This job enforces the "one family = one PR" scope and that the family ships a
# complete package: its three source files AND the three committed renders
# (the easy/medium/hard grid, the four benchmark views, and the min/max
# extremes). Requirements a human used to eyeball are now red/green.
#
# It runs on EVERY PR (no `paths` filter) and passes immediately for a non-family
# PR, so it is safe to add to the repo ruleset's required checks (context name:
# `family-pr-checks`) without leaving docs/CI-only PRs stuck "Expected — waiting".

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  family-pr-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need the base to diff changed files
      - name: one-family scope + required files + package whitelist
        run: |
          git fetch -q origin "${{ github.base_ref }}"
          DIFF=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")
          echo "Changed files:"; echo "$DIFF" | sed 's/^/  /'

          FAMS=$(echo "$DIFF" | grep -oE '^designs/[^/]+/' | cut -d/ -f2 | sort -u || true)
          NF=$(echo "$FAMS" | grep -c . || true)

          # non-family PR (nothing under designs/): nothing to gate — pass
          if [ "$NF" -eq 0 ]; then
            echo "Not a family PR (no designs/ changes) — family-pr-checks passes as a no-op."
            exit 0
          fi

          # 1) exactly one designs/<family>/ touched
          if [ "$NF" -ne 1 ]; then
            echo "::error::A family PR must touch exactly ONE designs/<family>/ (found ${NF}: $(echo $FAMS)). One family = one PR — split it."
            exit 1
          fi
          FAM="$FAMS"

          # 2) nothing outside that family dir (a new geomlib helper is the one exception)
          STRAY=$(echo "$DIFF" | grep -vE "^designs/${FAM}/" | grep -vE '^framework/bench2/geomlib/' || true)
          if [ -n "$STRAY" ]; then
            echo "::error::A family PR touches only designs/${FAM}/ (adding a bench2.geomlib helper is the sole exception). Remove from this PR: $(echo $STRAY)"
            exit 1
          fi

          # 3) the family ships all six required files (3 source + 3 renders)
          MISSING=""
          for f in part.py spec.py family.json preview.png preview_views.png preview_extremes.png; do
            [ -f "designs/${FAM}/${f}" ] || MISSING="${MISSING} ${f}"
          done
          if [ -n "$MISSING" ]; then
            echo "::error::designs/${FAM}/ is missing required file(s):${MISSING}"
            echo "::error::Source (part.py/spec.py/family.json) is required; run 'uv run bench2 preview ${FAM}' and commit preview.png + preview_views.png + preview_extremes.png (the easy/medium/hard grid, the four benchmark views, and the min/max extremes)."
            exit 1
          fi

          # 4) nothing but the package goes into designs/<family>/ — reference
          # PDFs/photos/scans belong in the family ISSUE, not the repo. Checked
          # on the files this PR adds/modifies (deletions are fine).
          ADDED=$(git diff --name-only --diff-filter=d "origin/${{ github.base_ref }}...HEAD" | grep -E "^designs/${FAM}/" | sed "s|^designs/${FAM}/||" || true)
          JUNK=$(echo "$ADDED" | grep -vE '^(part\.py|spec\.py|family\.json|NOTES\.md|preview\.png|preview_views\.png|preview_extremes\.png|preview_parts\.png)$' | grep . || true)
          if [ -n "$JUNK" ]; then
            echo "::error::designs/${FAM}/ must contain only the family package (part.py, spec.py, family.json, NOTES.md, preview.png, preview_views.png, preview_extremes.png, and preview_parts.png for assemblies). Reference drawings/photos/datasheets go in the family issue instead. Remove from this PR: $(echo $JUNK)"
            exit 1
          fi

          echo "OK — family='${FAM}': one-family scope clean, all six required files present, no stray files."
      # Two things a human used to catch by hand, now red/green with an exact
      # fix in the message: the PR checklist actually completed, and the family
      # dir named the same as the family issue it closes.
      - name: checklist completed + issue/family name coherence
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner, repo: context.repo.repo,
              pull_number: context.payload.pull_request.number, per_page: 100 });
            const fams = [...new Set(files.filter(f => f.filename.startsWith('designs/'))
              .map(f => f.filename.split('/')[1]).filter(Boolean))];
            if (fams.length !== 1) { core.info('not a single-family PR — handled by the scope step'); return; }
            const fam = fams[0];
            const body = context.payload.pull_request.body || '';
            const unchecked = (body.match(/^\s*-\s*\[ \]/gm) || []).length;
            if (unchecked > 0) {
              core.setFailed(
                `The PR checklist has ${unchecked} unchecked item(s). Complete every item (honestly — CI re-runs validate) ` +
                `and tick it by editing the PR description; no new push needed. Not done yet? Mark the PR as a Draft. ` +
                `/ PR 描述里的 checklist 还有 ${unchecked} 项未勾选:如实完成后直接编辑 PR 描述勾上即可,不用重新 push;尚未完成请转为 Draft。`);
            }
            const m = body.match(/\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/i);
            if (m) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner, repo: context.repo.repo, issue_number: Number(m[1]) });
                const t = (issue.title || '').match(/\[(?:family|proposal)\]\s*([a-z0-9_]+)/i);
                if (t && t[1] !== fam) {
                  core.setFailed(
                    `This PR changes designs/${fam}/ but links issue #${m[1]} ("${t[1]}"). The family dir, ` +
                    `family.json "family", and the issue name must match exactly — rename one side or fix the Closes line. ` +
                    `/ 目录名 ${fam} 与所关联 issue 的家族名 ${t[1]} 不一致,请统一命名。`);
                }
              } catch (e) { core.info('issue lookup skipped: ' + e.message); }
            }
