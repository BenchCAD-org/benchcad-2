name: require-issue-link
# Station 3 of the lifecycle (CONTRIBUTING.md): a family PR must link its family issue
# (`Closes #N`) — otherwise merge won't close the issue and dossier.yml
# can't post the acceptance evidence back to it.
#
# `check` is a REQUIRED status check (repo ruleset), so it must report on EVERY
# PR. It therefore runs on all PRs (no `paths` filter) and passes immediately for
# a non-family PR (nothing under designs/), enforcing the link only for family PRs.

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      pull-requests: read
    steps:
      - name: family PR body must contain a closing keyword + issue number
        uses: actions/github-script@v7
        with:
          script: |
            // Only family PRs (touching designs/) must link an issue.
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner, repo: context.repo.repo,
              pull_number: context.payload.pull_request.number, per_page: 100 });
            if (!files.some(f => f.filename.startsWith('designs/'))) {
              core.info('Not a family PR (no designs/ changes) — issue link not required.');
              return;
            }
            const body = context.payload.pull_request.body || '';
            const m = body.match(/\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/i);
            if (!m) {
              core.setFailed(
                'PR description must link its family issue, e.g. `Closes #12` ' +
                '(CONTRIBUTING.md station 3). Edit the PR description — no new push needed. ' +
                '/ PR 描述里需要写 `Closes #<issue编号>` 关联 family issue,' +
                '直接编辑 PR 描述即可,不用重新 push。');
              return;
            }
            const n = Number(m[1]);
            try {
              const { data: issue } = await github.rest.issues.get({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: n });
              if (issue.pull_request)
                core.setFailed(`#${n} is a pull request, not an issue — link the family issue.`);
              else if (issue.state !== 'open')
                core.setFailed(`Issue #${n} is already closed — is this family already merged?`);
              else
                core.info(`links open issue #${n}: ${issue.title}`);
            } catch (e) {
              core.setFailed(`Issue #${n} does not exist in this repo (typo?).`);
            }
