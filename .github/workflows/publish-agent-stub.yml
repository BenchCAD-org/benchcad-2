name: publish-agent-stub
on: workflow_dispatch
jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv build pypi-stub/benchcad-agent --out-dir dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
